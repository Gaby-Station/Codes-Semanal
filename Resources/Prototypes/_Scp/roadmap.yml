- type: roadmapVersions
  id: FireStationRoadmap
  fork: FIRE STATION
  versions:
    2024:
      name: 2024
      goals:
        scp-173:
          id: scp-173
          name: SCP-173 "Estátua"
          desc: Estátua que mata ao perder o contato visual. Rápida, silenciosa e letal se você piscar.
          state: Complete
        scp-999:
          id: scp-999
          name: SCP-999 "Monstro de Gelatina"
          desc: Entidade gelatinosa amigável que provoca alegria extrema e risadas. Capaz de aliviar o estresse e curar depressão.
          state: Complete
        scp-096:
          id: scp-096
          name: SCP-096 "Envergonhado"
          desc: Criatura extremamente perigosa que reage ao ser vista. Se alguém olhar para o seu rosto, nada pode salvar a vítima.
          state: Complete
        scp-939:
          id: scp-939
          name: SCP-939 "Com Muitas Vozes"
          desc: Criaturas predadoras sem olhos que atraem vítimas com as vozes de vítimas anteriores. Ideais para ataques furtivos no escuro.
          state: Complete
        scp-106:
          id: scp-106
          name: SCP-106 "O Velho"
          desc: Monstro velho e podre que surge de portais corrosivos. Caça suas vítimas com sadismo.
          state: Complete
        scp-049:
          id: scp-049
          name: SCP-049 "Doutor da Peste"
          desc: Humanoide misterioso com manto, que se considera um médico. Seu toque é mortal, e seu objetivo é "curar" a humanidade.
          state: Complete
    2025:
      name: 2025
      goals:
        scp-082:
          id: scp-082
          name: SCP-082 "Canibal Fernand"
          desc: Gigante com modos refinados e gosto por carne humana. Gosta de contar histórias antes de fazer um banquete.
          state: InProgress
        scp-rebalance:
          id: scp-rebalance
          name: Rebalanceamento dos SCPs
          desc: Os objetos SCP serão totalmente reequilibrados. Os fracos e chatos ficarão mais fortes e divertidos, e os muito fortes deixarão de ser. A força dos SCPs será baseada em sua classe de contenção – Seguro, Euclídeo ou Keter.
          state: InProgress
        access:
          id: access
          name: Cartões de acesso por nível
          desc: Os cartões de acesso serão divididos por nível, do 0 ao 5, como no lore.
          state: InProgress
        sounds:
          id: sounds
          name: Grande atualização de sons e ambientes
          desc: Adição de novos ambientes sonoros, músicas, e reformulação de sons principais com mais qualidade, tons escuros e abafados para combinar com a atmosfera SCP. Um novo design sonoro para melhorar a sensação opressiva do complexo.
          state: Complete
        foundation-map:
          id: foundation-map
          name: Novo mapa – Complexo
          desc: Um novo mapa será finalizado – o Complexo, completamente novo e diferente da estação.
          state: Complete
        rules:
          id: rules
          name: Regras transformadas em mecânicas
          desc: A maioria das regras ligadas a novos objetos ou papéis será convertida em mecânicas que automaticamente permitem ou impedem ações dos jogadores. O jogo observará os jogadores, não os administradores.
          state: InProgress
        new-roles:
          id: new-roles
          name: Reestruturação de papéis para a Fundação SCP
          desc: Todos os papéis serão refeitos com base nos funcionários da Fundação SCP, com sprites únicos, novos departamentos e sistema de interação entre si.
          state: InProgress
        resprite:
          id: resprite
          name: Grande reformulação visual (resprite)
          desc: Reformulação de todos os objetos principais do complexo para criar uma imersão maior com um estilo visual unificado e condizente com a atmosfera pesada, em vez da aparência plástica e "de brinquedo" da estação comum.
          state: Planned
        mtf:
          id: mtf
          name: Chamada da Força-Tarefa Móvel (MTF)
          desc: Jogadores poderão chamar a MTF para restaurar a contenção dos SCPs. Equipamentos e mecânicas da MTF serão totalmente refeitos.
          state: Planned
        chaos:
          id: chaos
          name: Rebeldes do Caos
          desc: Novos modos de jogo envolvendo a infiltração dos Rebeldes do Caos no complexo. Desde invasões com tiroteio até infiltrações furtivas.
          state: Planned
        gamemodes:
          id: gamemodes
          name: Reformulação dos modos de jogo padrão
          desc: Os modos de jogo serão refeitos com base no lore do SCP. Ex: revolução virará motim da Classe D, com mecânicas únicas como fuga silenciosa, ataque agressivo ou outros desdobramentos.
          state: Planned
        scpsl:
          id: scpsl
          name: Modo SCP SL
          desc: Modo de jogo inspirado no SCP: Secret Laboratory. Jogadores começam durante uma falha massiva de contenção, em um complexo gerado proceduralmente. O objetivo é sobreviver e escapar. Unidades MTF ou Rebeldes do Caos podem ajudar ou atrapalhar.
          state: Planned
    2026:
      name: 2026
