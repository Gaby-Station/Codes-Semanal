- type: roadmapVersions
  id: FireStationRoadmap
  fork: FIRE STATION
  versions:
    2024:
      name: 2024
      goals:
        scp-173:
          id: scp-173
          name: SCP-173 "Estátua"
          desc: Uma estátua que mata ao perder contato visual. Rápida, silenciosa e mortal se você piscar.
          state: Complete
        scp-999:
          id: scp-999
          name: SCP-999 "Monstro Gelatinoso"
          desc: Uma entidade amigável em forma de gelatina, que causa alegria e risadas infinitas. Capaz de aliviar o estresse e curar a depressão.
          state: Complete
        scp-096:
          id: scp-096
          name: SCP-096 "Homem Tímido"
          desc: Uma criatura extremamente perigosa que reage ao ser vista. Se alguém olhar para seu rosto, nada poderá salvar a vítima.
          state: Complete
        scp-939:
          id: scp-939
          name: SCP-939 "Com Múltiplas Vozes"
          desc: Criaturas predadoras sem olhos, que atraem vítimas com as vozes de vítimas anteriores. Perfeitas para ataques furtivos no escuro.
          state: Complete
        scp-106:
          id: scp-106
          name: SCP-106 "Velho"
          desc: Um monstro velho e apodrecido que aparece por portais corrosivos. Caça suas vítimas com sadismo.
          state: Complete
        scp-049:
          id: scp-049
          name: SCP-049 "Doutor da Peste"
          desc: Um humanoide misterioso em um manto, que se considera médico. Seu toque é mortal, e seu objetivo é "curar" a humanidade.
          state: Complete
    2025:
      name: 2025
      goals:
        scp-082:
          id: scp-082
          name: SCP-082 "Canibal Fernand"
          desc: Um gigante com boas maneiras e gosto por carne humana. Adora contar histórias antes de um banquete.
          state: InProgress
        scp-rebalance:
          id: scp-rebalance
          name: Rebalanceamento de SCPs
          desc: Os objetos SCP serão completamente reequilibrados. Objetos fracos e entediantes serão fortalecidos e mais divertidos, enquanto os muito fortes serão ajustados. A força será baseada em sua classe de contenção - Seguro, Euclídeo ou Keter.
          state: InProgress
        access:
          id: access
          name: Cartões de Acesso por Níveis
          desc: Os cartões de acesso serão organizados por níveis, de 0 a 5, exatamente como no lore.
          state: InProgress
        sounds:
          id: sounds
          name: Grande Atualização de Sons e Ambientes
          desc: Adição de novos ambientes atmosféricos, música, reformulação de sons principais para versões mais sombrias e de alta qualidade. Um novo design de som para melhorar a atmosfera opressiva do complexo SCP.
          state: Complete
        foundation-map:
          id: foundation-map
          name: Novo Mapa - Complexo
          desc: Um novo mapa será finalizado - um complexo totalmente novo e diferente da estação.
          state: Complete
        rules:
          id: rules
          name: Reestruturação de Regras em Mecânicas
          desc: A maioria das regras relacionadas a novos objetos ou papéis será convertida em mecânicas, que permitirão ou impedirão ações automaticamente, sem a necessidade de administração.
          state: InProgress
        new-roles:
          id: new-roles
          name: Reestruturação de Papéis para a Fundação SCP
          desc: Todos os papéis serão adaptados para funcionários da Fundação SCP, com sprites únicos, novos departamentos e sistemas de interação.
          state: InProgress
        resprite:
          id: resprite
          name: Grande Resprite
          desc: Resprite de todos os objetos principais do complexo, criando um visual imersivo e pesado, substituindo a estética plástica e artificial da estação comum.
          state: Planned
        mtf:
          id: mtf
          name: Chamado de Equipes MTF
          desc: Será possível chamar equipes MTF para restaurar condições de contenção. Equipamentos e mecânicas serão completamente reformulados.
          state: Planned
        chaos:
          id: chaos
          name: Insurgência do Caos
          desc: Modos de jogo relacionados a invasões da Insurgência do Caos serão adicionados. Incluem invasões completas e infiltrações furtivas.
          state: Planned
        gamemodes:
          id: gamemodes
          name: Reestruturação de Modos de Jogo
          desc: Modos de jogo serão completamente adaptados ao lore SCP. Por exemplo, revolução se tornará motim de Classe D, com mecânicas exclusivas e desfechos variados.
          state: Planned
        scpsl:
          id: scpsl
          name: Modo SCP SL
          desc: Um modo de jogo inspirado no SCP: Secret Laboratory. O pessoal começa durante uma violação massiva de contenção em um complexo gerado proceduralmente. A missão é sobreviver e escapar, enquanto equipes MTF ou Insurgência do Caos chegam para ajudar ou atrapalhar.
          state: Planned
    2026:
      name: 2026